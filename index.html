<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>بطاقة رمضان - إضافة اسم</title>

  <!-- خطوط احتياط (Fallback) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700&family=Cairo:wght@600;700&family=Noto+Kufi+Arabic:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --panel: rgba(255,255,255,.08);
      --border: rgba(255,255,255,.14);
    }

    /* ✅ خط DIN Next LT Arabic Bold */
    @font-face{
      font-family: "DINNextLTArabic";
      /* الخيار 1: من الرابط (قد لا يعمل في بعض الاستضافات بسبب CORS) */
      src: url("https://www.genspark.ai/api/files/s/BgkJxu4h") format("truetype");
      /* الخيار 2 (الأفضل): استضافة محلية داخل مشروعك:
         src: url("fonts/DINNextLTArabic-Bold.ttf") format("truetype");
      */
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px;
      background:#062b30;
      color:#fff;
      font-family: "DINNextLTArabic", "Tajawal", system-ui, -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
    }

    .wrap{ width:min(980px, 100%); display:grid; gap:14px; }

    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:14px;
      padding:16px;
    }

    .controls{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:flex-end;
    }

    .field{ flex: 1 1 360px; min-width: 240px; }
    label{ display:block; font-size:16px; opacity:.95; margin-bottom:8px; }

    input{
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.20);
      color:#fff;
      outline:none;
      box-sizing:border-box;
      font-family: inherit;
      font-size:16px;
    }

    button{
      padding:12px 16px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.10);
      color:#fff;
      cursor:pointer;
      white-space:nowrap;
      font-family: inherit;
      font-weight:700;
    }
    button:hover{ background:rgba(255,255,255,.16); }

    canvas{
      width:100%;
      height:auto;
      display:block;
      border-radius:14px;
      border:1px solid var(--border);
      background:#0b3f46;
    }

    .hint{
      font-size:13px;
      opacity:.85;
      line-height:1.7;
      margin-top:8px;
    }
    code{ background:rgba(0,0,0,.22); padding:2px 6px; border-radius:6px; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="controls">
        <div class="field">
          <label for="name">اكتب اسمك</label>
          <input id="name" type="text" placeholder="مثال: محمد" />
        </div>
        <button id="renderBtn">عرض بالاسم</button>
        <button id="downloadBtn">حفظ PNG</button>
      </div>

      <div class="hint">
        بطاقة معايدة
      </div>
    </div>

    <div class="card">
      <canvas id="c" width="709" height="1000"></canvas>
    </div>
  </div>

<script>
  // صورتك داخل GitHub / المشروع
  const IMAGE_SRC = "images/im1.png"; // غيّر الامتداد إذا لازم

  // ✅ خط الاسم (DIN) + حجم الخط
  const NAME_FONT = "700 32px DINNextLTArabic, Tajawal, Cairo, 'Noto Kufi Arabic', sans-serif";

  // ✅ لون الكتابة (الاسم) حسب طلبك
  const NAME_TEXT_COLOR = "#3A845D";

  // ننزل الاسم شوي داخل اللوحة
  const NAME_Y_OFFSET = 18;

  // مكان اللوحة (حسب مقاس 709x1000)
  const PLATE = { x: 95, y: 820, w: 519, h: 96 };

  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");

  const nameInput = document.getElementById("name");
  const renderBtn = document.getElementById("renderBtn");
  const downloadBtn = document.getElementById("downloadBtn");

  const img = new Image();
  img.src = IMAGE_SRC;

  function drawBase(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  }

  function drawName(name){
    const safe = String(name||"").trim().slice(0, 28);
    if(!safe) return;

    ctx.save();
    ctx.direction = "rtl";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    // ظل خفيف لتحسين القراءة
    ctx.shadowColor = "rgba(0,0,0,0.25)";
    ctx.shadowBlur = 4;
    ctx.shadowOffsetY = 2;

    ctx.fillStyle = NAME_TEXT_COLOR;
    ctx.font = NAME_FONT;

    const NAME_X_OFFSET = 12; // يمين شوي
    const x = PLATE.x + PLATE.w/2 + NAME_X_OFFSET;
    const y = PLATE.y + PLATE.h/2 + NAME_Y_OFFSET;

    ctx.fillText(safe, x, y);
    ctx.restore();
  }

  async function render(){
    // تأكد الصورة تحمّلت
    if(!img.complete){
      await new Promise((res, rej)=>{ img.onload=res; img.onerror=rej; });
    }

    // ✅ مهم جدًا: تأكد الخط تحمّل قبل الرسم على canvas
    if (document.fonts && document.fonts.load) {
      await document.fonts.load(NAME_FONT);
      await document.fonts.ready;
    }

    drawBase();
    drawName(nameInput.value);
  }

  function downloadPNG(){
    const a = document.createElement("a");
    a.download = "ramadan-card.png";
    a.href = canvas.toDataURL("image/png");
    a.click();
  }

  renderBtn.addEventListener("click", ()=>render().catch(()=>{}));
  downloadBtn.addEventListener("click", downloadPNG);

  img.onload = ()=>render();
  img.onerror = ()=>{
    alert("تعذر تحميل الصورة من المسار: " + IMAGE_SRC + " — تأكد من الاسم/الامتداد داخل مجلد images.");
  };
</script>
</body>
</html>
